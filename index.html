<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Widget Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
      position: relative;
    }

    /* ====== WALLPAPER ====== */
    #wallpaper {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%);
      background-size: cover;
      background-position: center;
      transition: background-image 0.4s ease;
      z-index: 0;
    }

    /* Desktop grid layout */
    #desktop {
      position: relative; z-index: 1;
      width: 100%; height: 100%;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr var(--todo-col-width, 340px);
      grid-template-rows: auto auto 1fr;
      gap: 16px;
      align-items: start;
    }

    /* ====== TIME WIDGET (top-left) ====== */
    .time-widget {
      grid-column: 1; grid-row: 1;
      width: 100%;
    }

    .time-card {
      width: 100%;
      box-sizing: border-box;
    }

    .time-card {
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.25);
      padding: 20px 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .time-display {
      font-size: clamp(64px, 8.5vw, 120px);
      font-weight: 200;
      color: white;
      letter-spacing: -3px;
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
      font-variant-numeric: tabular-nums;
      display: block;
      width: 100%;
      text-align: center;
    }

    .time-seconds {
      font-size: clamp(32px, 4.2vw, 60px);
      font-weight: 200;
      opacity: 0.55;
      letter-spacing: -1px;
    }

    .date-display {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-top: 6px;
      font-weight: 400;
      text-align: center;
      letter-spacing: 0.3px;
    }

    /* ====== WEATHER WIDGET (middle-left) ====== */
    .weather-row {
      grid-column: 1; grid-row: 2;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .weather-widget {
      width: fit-content;
    }

    .weather-card {
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.25);
      padding: 16px 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      min-width: 180px;
    }

    .weather-sky {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-bottom: 10px;
      letter-spacing: 0.2px;
    }

    .weather-stats {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    .weather-temp {
      font-size: 36px;
      font-weight: 200;
      color: white;
      letter-spacing: -1px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .weather-humidity {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
    }

    .weather-location {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-top: 6px;
      font-weight: 400;
    }

    .weather-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0;
    }

    .weather-edit-btn {
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
      opacity: 0.5;
      padding: 0 0 0 6px;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .weather-edit-btn:hover { opacity: 1; }

    .weather-edit-form {
      display: none;
      margin: 8px 0 6px;
      display: flex;
      gap: 6px;
    }

    .weather-input {
      flex: 1;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 8px;
      padding: 5px 9px;
      color: white;
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }
    .weather-input::placeholder { color: rgba(255,255,255,0.4); }
    .weather-input:focus { border-color: rgba(255,255,255,0.6); }

    .weather-search-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 10px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .weather-search-btn:hover { background: rgba(255,255,255,0.32); }

    .weather-candidates {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 6px;
    }

    .weather-candidate-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: rgba(255,255,255,0.85);
      font-size: 11px;
      font-family: inherit;
      padding: 6px 9px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .weather-candidate-btn:hover { background: rgba(255,255,255,0.22); color: white; }

    /* ====== DINO WIDGET ====== */
    .dino-widget {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 2px;
    }

    .dino-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .dino-emoji {
      font-size: clamp(80px, 9vw, 120px);
      line-height: 1;
      user-select: none;
      animation: dino-sleep 3.5s ease-in-out infinite;
    }

    @keyframes dino-sleep {
      0%,100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-5px) rotate(4deg); }
    }

    .dino-zzz {
      position: absolute;
      top: -8px;
      left: 60%;
      transform: translateX(0%);
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 0px;
      pointer-events: none;
    }
    .dino-zzz span {
      color: rgba(255,255,255,0.75);
      font-weight: 800;
      animation: zzz-float 2.4s ease-in-out infinite;
      opacity: 0;
    }
    .dino-zzz span:nth-child(1) { font-size: 9px;  animation-delay: 0s; }
    .dino-zzz span:nth-child(2) { font-size: 12px; animation-delay: 0.7s; }
    .dino-zzz span:nth-child(3) { font-size: 15px; animation-delay: 1.4s; }

    @keyframes zzz-float {
      0%   { opacity: 0; transform: translateY(0) translateX(0); }
      30%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-24px) translateX(6px); }
    }

    .dino-speech {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 12px;
      padding: 6px 11px;
      font-size: 11px;
      font-weight: 700;
      color: white;
      white-space: nowrap;
      animation: bubble-bounce 0.55s ease-in-out infinite alternate;
    }
    .dino-speech::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(255,255,255,0.4);
    }

    @keyframes bubble-bounce {
      from { transform: translateX(-50%) translateY(0); }
      to   { transform: translateX(-50%) translateY(-5px); }
    }

    /* Alert state */
    .dino-widget.alert .dino-emoji { animation: dino-jump 0.45s ease-in-out infinite; }
    .dino-widget.alert .dino-zzz   { display: none; }
    .dino-widget.alert .dino-speech { display: block; }

    @keyframes dino-jump {
      0%,100% { transform: translateY(0) scale(1) rotate(0deg); }
      50%     { transform: translateY(-14px) scale(1.12) rotate(-5deg); }
    }

    /* ====== NOTEPAD (bottom-left) ====== */
    .wallpaper-area {
      grid-column: 1; grid-row: 3;
      display: flex;
      flex-direction: column;
      align-self: stretch;
      padding-bottom: 32px;
    }

    .notepad-widget {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.25);
      padding: 14px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      min-width: 200px;
      overflow: hidden;
    }

    .notepad-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .notepad-title {
      font-size: 13px;
      font-weight: 700;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.25);
    }

    .notepad-count {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      font-variant-numeric: tabular-nums;
    }

    .notepad-textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: rgba(255,255,255,0.88);
      font-size: 12px;
      font-family: inherit;
      resize: none;
      line-height: 1.7;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .notepad-textarea::-webkit-scrollbar { display: none; }
    .notepad-textarea::placeholder { color: rgba(255,255,255,0.3); }

    .wallpaper-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      flex-shrink: 0;
      align-self: flex-start;
    }

    .wallpaper-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.22);
      border-radius: 12px;
      padding: 8px 14px;
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      user-select: none;
    }
    .wallpaper-btn:hover {
      background: rgba(255,255,255,0.22);
      color: white;
      transform: scale(1.03);
    }
    .wallpaper-btn input[type="color"] {
      position: absolute;
      opacity: 0;
      width: 0; height: 0;
      pointer-events: none;
    }
    .wallpaper-btn .icon { font-size: 15px; }
    .wallpaper-btn .color-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.5);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    /* Reset wallpaper btn */
    .reset-btn {
      margin-left: 0;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 8px 12px;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .reset-btn:hover { color: white; background: rgba(255,255,255,0.18); }

    /* ====== TODO WIDGET (top-right + stretches down) ====== */
    .todo-area {
      grid-column: 2; grid-row: 1 / 4;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      align-self: stretch;
      position: relative;
    }

    /* 拖拽调整宽度的手柄 */
    #todo-resize-handle {
      position: absolute;
      left: -8px;
      top: 0;
      width: 16px;
      height: 100%;
      cursor: col-resize;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #todo-resize-handle::after {
      content: '';
      width: 3px;
      height: 40px;
      border-radius: 3px;
      background: rgba(255,255,255,0.2);
      transition: background 0.2s, height 0.2s;
    }
    #todo-resize-handle:hover::after,
    #todo-resize-handle.dragging::after {
      background: rgba(255,255,255,0.6);
      height: 60px;
    }

    .widget {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.3);
      padding: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
    }

    #task-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }
    #task-list::-webkit-scrollbar { display: none; }

    /* 专注提醒卡片样式 - 放置在原小恐龙位置 */
    .status-card {
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 16px;
      border: 1.5px solid rgba(255,255,255,0.25);
      padding: 15px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
      width: 100%;
      box-sizing: border-box;
    }

    .stretch-countdown {
      font-size: 24px;
      font-weight: 200;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
    }

    .status-label {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      font-weight: 600;
      margin-bottom: 2px;
    }

    .reset-stretch-btn {
      background: rgba(100,220,120,0.2);
      border: 1px solid rgba(100,220,120,0.4);
      color: #a0ffb4;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .reset-stretch-btn:hover {
      background: rgba(100,220,120,0.4);
      transform: scale(1.05);
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .w-title { font-size: 16px; font-weight: 700; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.25); }
    .w-subtitle { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 3px; }

    .add-btn {
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.38);
      border-radius: 12px;
      color: white;
      font-size: 20px;
      font-weight: 300;
      width: 34px; height: 34px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0; line-height: 1;
    }
    .add-btn:hover { background: rgba(255,255,255,0.32); transform: scale(1.08); }

    /* ====== TASK ITEMS ====== */
    @keyframes jump {
      0%,100%{ transform:translateY(0); }
      20%    { transform:translateY(-8px); }
      40%    { transform:translateY(0); }
      60%    { transform:translateY(-4px); }
      80%    { transform:translateY(0); }
    }
    @keyframes flash {
      0%,100%{ opacity:1; background:rgba(255,80,60,0.2); }
      50%    { opacity:0.5; background:rgba(255,50,30,0.35); }
    }
    @keyframes shake {
      0%,100%{ transform:translateX(0); }
      20%    { transform:translateX(-5px); }
      40%    { transform:translateX(5px); }
      60%    { transform:translateX(-3px); }
      80%    { transform:translateX(3px); }
    }
    @keyframes pulse-glow {
      0%,100%{ box-shadow:0 0 0 rgba(255,212,59,0); }
      50%    { box-shadow:0 0 14px rgba(255,212,59,0.4); }
    }

    .task-item {
      background: rgba(255,255,255,0.11);
      border-radius: 14px;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 10px;
      position: relative;
    }
    .task-item:last-child { margin-bottom: 0; }
    .task-item.state-soon    { animation: pulse-glow 2.5s ease-in-out infinite; }
    .task-item.state-urgent  { animation: jump 1.4s ease-in-out infinite; }
    .task-item.state-panic   { animation: flash 0.7s ease-in-out infinite; }
    .task-item.state-overdue { animation: shake 0.55s ease-in-out infinite; }

    .task-bar { width: 3.5px; height: 40px; border-radius: 3px; flex-shrink: 0; }
    .task-content { flex:1; min-width:0; }
    .task-top-row { display:flex; align-items:center; gap:5px; margin-bottom:2px; }
    .task-emoji { font-size:15px; flex-shrink:0; line-height:1; }
    .task-name {
      font-size:13px; font-weight:600; color:white;
      text-shadow:0 1px 2px rgba(0,0,0,0.18);
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .task-ddl-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .task-ddl  { font-size:11px; font-weight:500; }
    .task-quip { font-size:11px; font-weight:700; opacity:0.95; }

    .done-btn {
      background: rgba(100,220,120,0.2);
      border: none; border-radius: 9px;
      color: rgba(160,255,180,0.95);
      font-size: 14px; width: 28px; height: 28px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
    }
    .done-btn:hover { background:rgba(100,220,120,0.42); color:white; transform:scale(1.15); }

    /* ====== ADD FORM ====== */
    .add-form {
      background: rgba(255,255,255,0.13);
      border-radius: 14px; padding: 12px;
      margin-bottom: 10px;
      border: 1.5px dashed rgba(255,255,255,0.28);
      animation: fadeSlide 0.22s ease;
    }
    @keyframes fadeSlide { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    .form-title { font-size:12px; font-weight:600; color:rgba(255,255,255,0.85); margin-bottom:9px; }
    .form-input {
      width:100%; background:rgba(255,255,255,0.16);
      border:1px solid rgba(255,255,255,0.28); border-radius:9px;
      padding:7px 10px; color:white; font-size:12px; font-family:inherit;
      outline:none; margin-bottom:6px; transition:all 0.2s;
    }
    .form-input::placeholder { color:rgba(255,255,255,0.48); }
    .form-input:focus { border-color:rgba(255,255,255,0.62); background:rgba(255,255,255,0.24); }
    input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter:invert(1) opacity(0.55); cursor:pointer; }

    .submit-btn {
      background: rgba(255,255,255,0.26); border:1.5px solid rgba(255,255,255,0.42);
      border-radius:9px; color:white; font-size:12px; font-weight:600;
      padding:7px 0; cursor:pointer; width:100%; transition:all 0.2s; font-family:inherit;
    }
    .submit-btn:hover { background:rgba(255,255,255,0.38); }

    .empty-state {
      text-align:center; color:rgba(255,255,255,0.62);
      font-size:13px; padding:20px 0; line-height:1.9;
    }

    /* ====== TOAST ====== */
    .toast {
      position:fixed; top:16px; left:50%;
      transform:translateX(-50%) translateY(-80px);
      background:rgba(30,30,50,0.9); backdrop-filter:blur(12px);
      color:white; padding:10px 20px; border-radius:40px;
      font-size:13px; font-weight:600;
      box-shadow:0 4px 20px rgba(0,0,0,0.3);
      transition:transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
      z-index:999; white-space:nowrap;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }

    /* ====== PRIORITY BADGES ====== */
    .task-priority {
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 5px;
      flex-shrink: 0; letter-spacing: 0.3px;
    }
    .task-priority.p1 { background: rgba(255,70,70,0.2); color: #ff8080; }
    .task-priority.p2 { background: rgba(255,150,0,0.2); color: #ffaa50; }
    .task-priority.p3 { background: rgba(255,210,0,0.2); color: #ffd060; }
    .task-priority.p4 { background: rgba(100,200,100,0.2); color: #80d080; }
    .task-priority.p5 { background: rgba(100,160,255,0.2); color: #80b0ff; }

    /* ====== SORT TOGGLE ====== */
    .sort-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px; color: rgba(255,255,255,0.6);
      font-size: 10px; font-weight: 600;
      padding: 5px 9px; cursor: pointer;
      font-family: inherit; transition: all 0.2s; white-space: nowrap;
    }
    .sort-btn:hover { background: rgba(255,255,255,0.2); color: white; }

    /* ====== TIMER DURATION BUTTONS ====== */
    .timer-row { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .duration-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 6px; color: rgba(255,255,255,0.45);
      font-size: 10px; font-weight: 600;
      padding: 3px 7px; cursor: pointer;

    .duration-btn:hover { background: rgba(255,255,255,0.16); color: rgba(255,255,255,0.9); }
    .duration-btn.sel { background: rgba(255,255,255,0.2); color: white; border-color: rgba(255,255,255,0.38); }

    /* ====== START/PAUSE BUTTON ====== */
    .start-timer-btn {
      background: rgba(100,220,120,0.2);
      border: 1px solid rgba(100,220,120,0.4);
      color: #a0ffb4; padding: 7px 11px;
      border-radius: 10px; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: inherit; white-space: nowrap;

    .start-timer-btn.running {
      background: rgba(255,165,0,0.2); border-color: rgba(255,165,0,0.4); color: #ffc060;
    }
    .start-timer-btn.running:hover { background: rgba(255,165,0,0.4); color: white; }

    /* ====== PRIORITY FORM PICKER ====== */
    .form-priority-row { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; flex-wrap: wrap; }
    .form-priority-label { font-size: 11px; color: rgba(255,255,255,0.5); flex-shrink: 0; }
    .ppick {
      font-size: 11px; font-weight: 700; padding: 4px 9px;
      border-radius: 7px; border: 1.5px solid transparent;
      cursor: pointer; font-family: inherit; transition: all 0.15s; opacity: 0.65;
    }
    .ppick:hover { opacity: 1; transform: scale(1.05); }
    .ppick.sel { border-color: rgba(255,255,255,0.7); opacity: 1; }
    .ppick.pp1 { background: rgba(255,70,70,0.25); color: #ff8080; }
    .ppick.pp2 { background: rgba(255,150,0,0.25); color: #ffaa50; }
    .ppick.pp3 { background: rgba(255,210,0,0.25); color: #ffd060; }
    .ppick.pp4 { background: rgba(100,200,100,0.25); color: #80d080; }
    .ppick.pp5 { background: rgba(100,160,255,0.25); color: #80b0ff; }

    /* ====== MENU TRIGGER (right-edge bar) ====== */
    #menu-btn {
      position: fixed;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 48px;
      background: rgba(255,255,255,0.22);
      border-radius: 3px 0 0 3px;
      border: none; padding: 0; cursor: pointer;
      z-index: 200;
      transition: width 0.22s ease, height 0.22s ease, background 0.22s ease;
    }
    #menu-btn:hover {
      width: 5px; height: 72px;
      background: rgba(255,255,255,0.55);
    }
    #menu-btn span { display: none; }

    /* ====== SIDE MENU ====== */
    #menu-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px); z-index: 300;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #menu-overlay.open { opacity: 1; pointer-events: all; }

    #side-menu {
      position: fixed; top: 0; right: -340px;
      width: 310px; height: 100%;
      background: rgba(12,16,36,0.94);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      border-left: 1.5px solid rgba(255,255,255,0.1);
      z-index: 400; display: flex; flex-direction: column;
      padding: 28px 22px; transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
    }
    #side-menu.open { right: 0; }

    .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 26px; }
    .menu-title { font-size: 18px; font-weight: 700; color: white; letter-spacing: -0.3px; }
    .menu-close-btn {
      background: rgba(255,255,255,0.1); border: none; border-radius: 8px;
      color: rgba(255,255,255,0.6); width: 30px; height: 30px; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .menu-close-btn:hover { background: rgba(255,255,255,0.2); color: white; }
    .menu-section { margin-bottom: 22px; }
    .menu-section-title {
      font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
    }
    .menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 13px; border-radius: 12px; cursor: pointer;
      transition: all 0.2s; color: rgba(255,255,255,0.8);
      font-size: 13.5px; font-weight: 500; margin-bottom: 3px;
      border: 1px solid transparent;
    }
    .menu-item:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.1); }
    .menu-item.active { background: rgba(255,255,255,0.14); color: white; border-color: rgba(255,255,255,0.18); }
    .menu-item-icon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
    .menu-item-desc { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }

    .menu-toggle {
      margin-left: auto; width: 34px; height: 19px;
      background: rgba(255,255,255,0.15); border-radius: 10px;
      position: relative; transition: background 0.2s; flex-shrink: 0;
    }
    .menu-toggle.on { background: rgba(100,220,120,0.5); }
    .menu-toggle::after {
      content: ''; position: absolute; left: 2px; top: 1.5px;
      width: 16px; height: 16px; border-radius: 50%;
      background: white; transition: left 0.2s;
    }
    .menu-toggle.on::after { left: 16px; }

    /* Mascot collapsible panel */
    .mascot-panel {
      max-height: 0; overflow: hidden;
      transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1);
    }
    .mascot-panel.open { max-height: 500px; }
    .menu-chevron {
      font-size: 14px; color: rgba(255,255,255,0.35);
      transition: transform 0.25s ease; flex-shrink: 0; margin-left: auto;
      line-height: 1;
    }
    .menu-item.pet-open .menu-chevron { transform: rotate(90deg); color: rgba(255,255,255,0.7); }

    /* Mascot grid */
    .mascot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; padding: 10px 2px 4px; }
    .mascot-option {
      background: rgba(255,255,255,0.07); border: 1.5px solid transparent;
      border-radius: 11px; padding: 9px 4px; text-align: center;
      cursor: pointer; transition: all 0.15s;
    }
    .mascot-option:hover { background: rgba(255,255,255,0.14); }
    .mascot-option.sel { border-color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.16); }
    .mascot-option .m-emoji { font-size: 22px; display: block; margin-bottom: 3px; }
    .mascot-option .m-name { font-size: 9px; color: rgba(255,255,255,0.4); font-weight: 600; }

    /* Lang pill */
    .lang-pill { display: flex; background: rgba(255,255,255,0.08); border-radius: 20px; padding: 3px; margin-left: auto; }
    .lang-pill button {
      background: none; border: none; color: rgba(255,255,255,0.45);
      font-size: 11px; font-weight: 700; padding: 4px 10px;
      border-radius: 16px; cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .lang-pill button.active { background: rgba(255,255,255,0.2); color: white; }

    /* ====== CALENDAR MODAL ====== */
    #calendar-modal {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
    }
    #calendar-modal.open { display: flex; }
    .calendar-panel {
      background: rgba(12,16,42,0.96); backdrop-filter: blur(32px);
      border: 1.5px solid rgba(255,255,255,0.14); border-radius: 24px;
      padding: 26px; width: 500px; max-height: 82vh; overflow-y: auto;
    }
    .calendar-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .cal-title { font-size: 17px; font-weight: 700; color: white; flex: 1; text-align: center; }
    .cal-nav-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; color: white; width: 30px; height: 30px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .cal-nav-btn:hover { background: rgba(255,255,255,0.2); }
    .cal-close-btn {
      background: rgba(255,255,255,0.1); border: none; border-radius: 8px;
      color: rgba(255,255,255,0.6); width: 30px; height: 30px;
      font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .cal-close-btn:hover { background: rgba(255,255,255,0.2); color: white; }
    .cal-view-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .cal-tab {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: rgba(255,255,255,0.45);
      font-size: 11px; font-weight: 600; padding: 5px 12px;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .cal-tab.active { background: rgba(255,255,255,0.18); color: white; border-color: rgba(255,255,255,0.28); }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
    .cal-weekday { text-align: center; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.25); padding: 4px 0; letter-spacing: 0.5px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-day {
      border-radius: 9px; padding: 5px 3px;
      display: flex; flex-direction: column; align-items: center;
      font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.45);
      transition: all 0.15s; min-height: 42px;
    }
    .cal-day.today { background: rgba(255,255,255,0.12); color: white; }
    .cal-day.has-task { cursor: pointer; }
    .cal-day.has-task:hover { background: rgba(255,255,255,0.1); color: white; }
    .cal-day-num { line-height: 1.6; }
    .cal-dot-row { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; margin-top: 2px; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; }

    /* ====== REPORT MODAL ====== */
    #report-modal {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
    }
    #report-modal.open { display: flex; }
    .report-panel {
      background: rgba(12,16,42,0.96); backdrop-filter: blur(32px);
      border: 1.5px solid rgba(255,255,255,0.14); border-radius: 24px;
      padding: 26px; width: 460px; max-height: 82vh; overflow-y: auto;
    }
    .report-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .report-title { font-size: 17px; font-weight: 700; color: white; }
    .report-close-btn {
      background: rgba(255,255,255,0.1); border: none; border-radius: 8px;
      color: rgba(255,255,255,0.6); width: 30px; height: 30px;
      font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .report-close-btn:hover { background: rgba(255,255,255,0.2); color: white; }
    .report-date-row { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .report-date-input {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px; padding: 6px 10px; color: white;
      font-size: 12px; font-family: inherit; outline: none;
    }
    .report-date-input::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.5); cursor: pointer; }
    .report-gen-btn {
      background: rgba(100,160,255,0.2); border: 1px solid rgba(100,160,255,0.35);
      color: #80b0ff; border-radius: 8px; padding: 6px 14px;
      font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .report-gen-btn:hover { background: rgba(100,160,255,0.4); color: white; }
    .report-stats { display: flex; gap: 10px; margin-bottom: 16px; }
    .report-stat-box { flex: 1; background: rgba(255,255,255,0.07); border-radius: 12px; padding: 12px; text-align: center; }
    .report-stat-num { font-size: 26px; font-weight: 200; color: white; }
    .report-stat-label { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .report-section-label {
      font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.28);
      letter-spacing: 1.5px; text-transform: uppercase; margin: 12px 0 6px;
    }
    .report-task-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 10px;
      background: rgba(255,255,255,0.05); font-size: 12px;
      color: rgba(255,255,255,0.8); margin-bottom: 4px;
    }
    .report-task-done { opacity: 0.45; text-decoration: line-through; }

    /* ====== FOCUS MODE ====== */
    .focus-mode .time-widget,
    .focus-mode .weather-row,
    .focus-mode .wallpaper-area { display: none !important; }
    .focus-mode #desktop { grid-template-columns: 1fr; }
    .focus-mode .todo-area { grid-column: 1; }
    .focus-mode #todo-resize-handle { display: none; }

    /* ====== WATERMARK ====== */
    .watermark {
      position: fixed;
      bottom: 20px;
      left: 24px;
      z-index: 999;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.4px;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div id="wallpaper"></div>
  <div class="toast" id="toast"></div>
  <div class="watermark">Zzzack's first creativity!!!</div>

  <div id="desktop">

    <!-- TIME WIDGET -->
    <div class="time-widget">
      <div class="time-card">
        <div class="time-display">
          <span id="time-hm">--:--</span><span class="time-seconds" id="time-s">:--</span>
        </div>
        <div class="date-display" id="date-display">加载中…</div>
      </div>
    </div>

    <!-- WEATHER + WALLPAPER ROW -->
    <div class="weather-row">
      <div class="weather-widget">
        <div class="weather-card">
          <div class="weather-top-row">
            <div class="weather-sky" id="weather-sky">获取天气中…</div>
            <button class="weather-edit-btn" onclick="toggleCityEdit()" title="切换城市">📍</button>
          </div>
          <div class="weather-edit-form" id="weather-edit-form">
            <input class="weather-input" id="weather-city-input" placeholder="城市名 / City name…" />
            <button class="weather-search-btn" onclick="searchCity()">搜索</button>
          </div>
          <div class="weather-candidates" id="weather-candidates"></div>
          <div class="weather-stats">
            <span class="weather-temp" id="weather-temp">--°</span>
            <span class="weather-humidity" id="weather-humidity">湿度 --%</span>
          </div>
          <div class="weather-location" id="weather-location"></div>
        </div>
      </div>

      <div class="dino-widget" id="dino-widget">
        <div class="dino-container">
          <div class="dino-speech" id="dino-speech">该去拉伸啦！🏃</div>
          <div class="dino-emoji" id="mascot-emoji">🦕</div>
          <div class="dino-zzz">
            <span>z</span><span>z</span><span>z</span>
          </div>
        </div>
      </div>
    </div>

    <!-- NOTEPAD -->
    <div class="wallpaper-area">
      <div class="notepad-widget">
        <div class="notepad-header">
          <span class="notepad-title" id="notepad-title-text">🌿 随想录</span>
          <span class="notepad-count" id="notepad-count">500</span>
        </div>
        <textarea class="notepad-textarea" id="notepad-textarea" maxlength="500" placeholder="写下一些你今日的灵感吧！让我们效率拉满！"></textarea>
      </div>
    </div>

    <!-- TODO WIDGET -->
    <div class="todo-area">
      <div id="todo-resize-handle"></div>
      <div class="widget">

        <!-- 专注与拉伸提醒卡片 -->
        <div class="status-card" id="stretch-timer-card">
          <div class="status-info" style="flex:1;min-width:0;">
            <div class="status-label">
              <span id="current-status">准备开始 ⏸</span>
              <span id="session-counter" style="margin-left:8px;opacity:0.7;font-weight:400;">(今日专注: 0 次)</span>
            </div>
            <div class="stretch-countdown" id="stretch-countdown">60:00</div>
            <div class="timer-row" id="timer-row">
              <button class="duration-btn" data-mins="15" onclick="setDuration(15)">15分</button>
              <button class="duration-btn" data-mins="25" onclick="setDuration(25)">25分</button>
              <button class="duration-btn" data-mins="45" onclick="setDuration(45)">45分</button>
              <button class="duration-btn sel" data-mins="60" onclick="setDuration(60)">60分</button>
              <button class="duration-btn" data-mins="90" onclick="setDuration(90)">90分</button>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;">
            <button class="start-timer-btn" id="start-timer-btn" onclick="startPauseTimer()">▶ 开始</button>
            <button class="reset-stretch-btn" onclick="resetStretchTimer()">重置</button>
          </div>
        </div>

        <div class="header">
          <div>
            <div class="w-title">⚡ 我的任务</div>
            <div class="w-subtitle" id="task-count">…</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <button class="sort-btn" id="sort-btn" onclick="toggleSortMode()">按紧急</button>
            <button class="add-btn" onclick="toggleForm()">+</button>
          </div>
        </div>

        <div class="add-form" id="add-form" style="display:none;">
          <div class="form-title" id="add-form-title">✨ 新任务</div>
          <input class="form-input" type="text" id="task-name" placeholder="任务名称…" />
          <input class="form-input" type="datetime-local" id="task-ddl" />
          <div class="form-priority-row">
            <span class="form-priority-label">优先级:</span>
            <button class="ppick pp1" onclick="selectPriority(1)">P1 紧急</button>
            <button class="ppick pp2" onclick="selectPriority(2)">P2 高</button>
            <button class="ppick pp3 sel" onclick="selectPriority(3)">P3 中</button>
            <button class="ppick pp4" onclick="selectPriority(4)">P4 低</button>
            <button class="ppick pp5" onclick="selectPriority(5)">P5 可选</button>
          </div>
          <button class="submit-btn" id="submit-btn" onclick="addTask()">添加 ✓</button>
        </div>

        <div id="task-list"></div>
      </div>
    </div>

  </div><!-- /desktop -->

  <!-- HAMBURGER MENU BUTTON -->
  <button id="menu-btn" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>

  <!-- MENU OVERLAY -->
  <div id="menu-overlay" onclick="closeMenu()"></div>

  <!-- SIDE MENU -->
  <div id="side-menu">
    <div class="menu-header">
      <span class="menu-title" id="menu-title-text">扩展坞</span>
      <button class="menu-close-btn" onclick="closeMenu()">✕</button>
    </div>

    <div class="menu-section">
      <div class="menu-section-title">工具</div>
      <div class="menu-item" id="focus-menu-item" onclick="toggleFocusMode()">
        <span class="menu-item-icon">🎯</span>
        <div>
          <div id="focus-mode-label">专注模式</div>
          <div class="menu-item-desc" id="focus-mode-desc">隐藏其他模块，只看任务</div>
        </div>
        <div class="menu-toggle" id="focus-toggle"></div>
      </div>
      <div class="menu-item" onclick="openCalendar()">
        <span class="menu-item-icon">📅</span>
        <div>
          <div id="calendar-label">日历视图</div>
          <div class="menu-item-desc" id="calendar-desc">查看任务日程总览</div>
        </div>
      </div>
      <div class="menu-item" onclick="openReport()">
        <span class="menu-item-icon">📊</span>
        <div>
          <div id="report-label">工作报告</div>
          <div class="menu-item-desc" id="report-desc">查看时间段内的任务情况</div>
        </div>
      </div>
    </div>

    <div class="menu-section">
      <div class="menu-item" id="pet-trigger" onclick="toggleMascotPanel()" style="cursor:pointer;">
        <span class="menu-item-icon">🐾</span>
        <div>
          <div id="custom-section-title">陪伴小宠</div>
          <div class="menu-item-desc">选择你的专属伴侣</div>
        </div>
        <span class="menu-chevron">›</span>
      </div>
      <div class="mascot-panel" id="mascot-panel">
        <div class="mascot-grid" id="mascot-grid"></div>
      </div>
    </div>

    <div class="menu-section">
      <div class="menu-section-title">壁纸</div>
      <label class="menu-item" for="wallpaper-color-input" style="cursor:pointer;">
        <span class="menu-item-icon">🎨</span>
        <div>
          <div>背景配色</div>
          <div class="menu-item-desc">点击选择颜色</div>
        </div>
        <span id="color-dot" style="width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.35);margin-left:auto;flex-shrink:0;display:block;background:#533483;"></span>
      </label>
      <input type="color" id="wallpaper-color-input" value="#533483" oninput="applyColorWallpaper(this.value)" style="position:fixed;top:-999px;left:-999px;opacity:0;">
      <div class="menu-item" onclick="resetWallpaper()">
        <span class="menu-item-icon">↩️</span>
        <div>重置壁纸</div>
      </div>
    </div>

    <div class="menu-section">
      <div class="menu-item" style="cursor:default;">
        <span class="menu-item-icon">🌐</span>
        <div>语言 / Language</div>
        <div class="lang-pill">
          <button data-lang="zh" onclick="applyLanguage('zh')">中文</button>
          <button data-lang="en" onclick="applyLanguage('en')">EN</button>
        </div>
      </div>

    <div class="menu-section">
      <div class="menu-section-title">其他</div>
      <div class="menu-item" style="opacity:0.35;cursor:default;">
        <span class="menu-item-icon">👤</span>
        <div>
          <div>账号设置</div>

  <div id="calendar-modal">

        <div class="cal-weekday">日</div><div class="cal-weekday">一</div>
        <div class="cal-weekday">二</div><div class="cal-weekday">三</div>
        <div class="cal-weekday">四</div><div class="cal-weekday">五</div>

  <!-- REPORT MODAL -->
  <div id="report-modal">
    <div class="report-panel">
      <div class="report-header">
        <span class="report-title">📊 工作报告</span>
        <button class="report-close-btn" onclick="closeReport()">✕</button>

        <input type="date" class="report-date-input" id="report-from" />

        </div>
        <div class="report-stat-box">
          <div class="report-stat-num" id="report-pending-count">0</div>
          <div class="report-stat-label">进行中</div>
        </div>
        <div class="report-stat-box">
          <div class="report-stat-num" id="report-overdue-count">0</div>
          <div class="report-stat-label">已超期</div>
        </div>

      <div id="report-task-list"></div>

  <script>
    // ===== CLOCK =====
    const WEEKDAYS = ["周日","周一","周二","周三","周四","周五","周六"];
    const MONTHS   = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
    let currentTimezone = null;

    function updateClock() {
      const now = new Date();
      let hh, mm, ss, dateText;

      if (currentTimezone) {
        const tp = new Intl.DateTimeFormat('zh-CN', {
          timeZone: currentTimezone,
          hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
        }).formatToParts(now);
        const dp = new Intl.DateTimeFormat('zh-CN', {
          timeZone: currentTimezone,
          year: 'numeric', month: 'numeric', day: 'numeric', weekday: 'short'
        }).formatToParts(now);
        const t = Object.fromEntries(tp.map(({type,value}) => [type,value]));
        const d = Object.fromEntries(dp.map(({type,value}) => [type,value]));
        hh = t.hour; mm = t.minute; ss = t.second;
        dateText = `${d.year} 年 ${d.month} 月 ${d.day} 日  ${d.weekday}`;
      } else {
        hh  = String(now.getHours()).padStart(2,"0");
        mm  = String(now.getMinutes()).padStart(2,"0");
        ss  = String(now.getSeconds()).padStart(2,"0");
        dateText = `${now.getFullYear()} 年 ${MONTHS[now.getMonth()]} ${now.getDate()} 日  ${WEEKDAYS[now.getDay()]}`;
      }

      document.getElementById("time-hm").textContent = hh + ":" + mm;
      document.getElementById("time-s").textContent  = ":" + ss;
      document.getElementById("date-display").textContent = dateText;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ===== WEATHER =====
    let weatherRefreshTimer = null;

    function getSkyDesc(weatherCode, isDay, now, sunriseStr, sunsetStr) {
      const sunrise = new Date(sunriseStr);
      const sunset  = new Date(sunsetStr);
      const minsToSunrise = (sunrise - now) / 60000;
      const minsAfterSunset = (now - sunset) / 60000;
      if (minsToSunrise >= -30 && minsToSunrise <= 30) return "朝霞满天 🌅";
      if (minsAfterSunset >= 0 && minsAfterSunset <= 40) return "落日余晖 🌇";
      if ([95,96,99].includes(weatherCode)) return "雷雨交加 ⛈️";
      if ([61,63,65,80,81,82].includes(weatherCode)) return "细雨绵绵 🌧️";
      if ([51,53,55].includes(weatherCode)) return "毛毛细雨 🌦️";
      if ([71,73,75,85,86].includes(weatherCode)) return "白雪皑皑 ❄️";
      if ([45,48].includes(weatherCode)) return "云雾弥漫 🌫️";
      if (!isDay) {
        if (weatherCode === 0) return "繁星点点 ✨";
        if ([1,2].includes(weatherCode)) return "月色朦胧 🌙";
        return "夜幕低垂 🌃";
      }
      if (weatherCode === 0) return "艳阳高照 ☀️";
      if (weatherCode === 1) return "晴空万里 🌤️";
      if (weatherCode === 2) return "云淡风轻 ⛅";
      if (weatherCode === 3) return "阴云密布 ☁️";
      return "天气多变 🌡️";
    }

    function fetchWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,relative_humidity_2m,weather_code,is_day` +
        `&daily=sunrise,sunset&timezone=auto&forecast_days=1`;
      fetch(url)
        .then(r => r.json())
        .then(data => {
          const c = data.current;
          const sky = getSkyDesc(c.weather_code, c.is_day === 1, new Date(),
            data.daily.sunrise[0], data.daily.sunset[0]);
          document.getElementById("weather-temp").textContent = `${Math.round(c.temperature_2m)}°`;
          document.getElementById("weather-humidity").textContent = `湿度 ${c.relative_humidity_2m}%`;
          document.getElementById("weather-sky").textContent = sky;
        })
        .catch(() => {
          document.getElementById("weather-sky").textContent = "天气获取失败 🌐";
        });
    }

    function startWeatherRefresh(lat, lon) {
      fetchWeather(lat, lon);
      clearInterval(weatherRefreshTimer);
      weatherRefreshTimer = setInterval(() => fetchWeather(lat, lon), 10 * 60 * 1000);
    }

    function toggleCityEdit() {
      const form = document.getElementById("weather-edit-form");
      const visible = form.style.display !== "none";
      form.style.display = visible ? "none" : "flex";
      if (!visible) document.getElementById("weather-city-input").focus();
    }

    function applyCity({ latitude, longitude, timezone, name, admin1, country }) {
      const label = `📍 ${name}${admin1 ? ', ' + admin1 : ''}, ${country}`;
      currentTimezone = timezone;
      localStorage.setItem('todo_weather_lat', latitude);
      localStorage.setItem('todo_weather_lon', longitude);
      localStorage.setItem('todo_weather_tz', timezone);
      localStorage.setItem('todo_weather_city', label);
      document.getElementById("weather-location").textContent = label;
      document.getElementById("weather-edit-form").style.display = "none";
      document.getElementById("weather-candidates").innerHTML = "";
      document.getElementById("weather-city-input").value = "";
      startWeatherRefresh(latitude, longitude);
      showToast(`🌍 已切换到 ${name}，时钟同步当地时间`);
    }

    function searchCity() {
      const input = document.getElementById("weather-city-input").value.trim();
      if (!input) return;
      const prevSky = document.getElementById("weather-sky").textContent;
      document.getElementById("weather-sky").textContent = "搜索中…";
      document.getElementById("weather-candidates").innerHTML = "";

      // 同时用中文和英文搜索，合并结果
      const urls = [
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(input)}&count=10&language=zh`,
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(input)}&count=10&language=en`
      ];

      Promise.all(urls.map(u => fetch(u).then(r => r.json()).catch(() => ({ results: [] }))))
        .then(([zhData, enData]) => {
          document.getElementById("weather-sky").textContent = prevSky;

          // 合并并去重（按 id），按人口降序排列
          const seen = new Set();
          const merged = [...(zhData.results || []), ...(enData.results || [])]
            .filter(r => { if (seen.has(r.id)) return false; seen.add(r.id); return true; })
            .sort((a, b) => (b.population || 0) - (a.population || 0))
            .slice(0, 6);

          if (!merged.length) { showToast("❌ 找不到该城市，请尝试英文名"); return; }
          if (merged.length === 1) { applyCity(merged[0]); return; }

          const container = document.getElementById("weather-candidates");
          container.innerHTML = "";
          merged.forEach(r => {
            const label = `${r.name}${r.admin1 ? ', ' + r.admin1 : ''}, ${r.country}`;
            const btn = document.createElement("button");
            btn.className = "weather-candidate-btn";
            btn.textContent = label;
            btn.onclick = () => applyCity(r);
            container.appendChild(btn);
          });
        })
        .catch(() => showToast("❌ 城市搜索失败，请检查网络"));
    }

    function initWeather() {
      // 优先读取上次保存的城市
      const savedLat  = parseFloat(localStorage.getItem('todo_weather_lat'));
      const savedLon  = parseFloat(localStorage.getItem('todo_weather_lon'));
      const savedTz   = localStorage.getItem('todo_weather_tz');
      const savedCity = localStorage.getItem('todo_weather_city');
      if (savedLat && savedLon) {
        currentTimezone = savedTz || null;
        document.getElementById("weather-location").textContent = savedCity || "";
        startWeatherRefresh(savedLat, savedLon);
        return;
      }
      // 尝试浏览器定位
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => startWeatherRefresh(pos.coords.latitude, pos.coords.longitude),
          () => {
            startWeatherRefresh(39.9042, 116.4074);
            document.getElementById("weather-location").textContent = "位置未授权，显示默认城市";
          }
        );
      } else {
        startWeatherRefresh(39.9042, 116.4074);
      }
    }

    // 城市输入框支持回车确认
    document.getElementById("weather-city-input")
      .addEventListener("keydown", e => { if (e.key === "Enter") searchCity(); });

    // 初始化时隐藏输入框（CSS flex 会覆盖，强制设置）
    document.getElementById("weather-edit-form").style.display = "none";

    initWeather();

    // ===== WALLPAPER =====
    function hexToHSL(hex) {
      let r = parseInt(hex.slice(1,3),16)/255;
      let g = parseInt(hex.slice(3,5),16)/255;
      let b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h, s, l = (max+min)/2;
      if (max === min) { h = s = 0; } else {
        const d = max-min;
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        switch(max){
          case r: h=((g-b)/d+(g<b?6:0))/6; break;
          case g: h=((b-r)/d+2)/6; break;
          case b: h=((r-g)/d+4)/6; break;
        }
      }
      return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
    }

    function applyColorWallpaper(hex) {
      const [h, s, l] = hexToHSL(hex);
      const dark   = `hsl(${h}, ${Math.min(s+15,100)}%, ${Math.max(l-35,4)}%)`;
      const mid    = `hsl(${h}, ${s}%, ${Math.max(l-18,8)}%)`;
      const accent = `hsl(${(h+25)%360}, ${Math.max(s-8,15)}%, ${Math.min(l+5,45)}%)`;
      const wp = document.getElementById("wallpaper");
      wp.style.backgroundImage = "";
      wp.style.background = `linear-gradient(135deg, ${dark} 0%, ${mid} 55%, ${accent} 100%)`;
      document.getElementById("color-dot").style.background = hex;
      localStorage.setItem('todo_wallpaper_color', hex);
    }

    function resetWallpaper() {
      const wp = document.getElementById("wallpaper");
      wp.style.background = "linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%)";
      wp.style.backgroundImage = "";
      document.getElementById("wallpaper-color-input").value = "#533483";
      document.getElementById("color-dot").style.background = "#533483";
      localStorage.removeItem('todo_wallpaper_color');
      showToast("✨ 已重置为默认配色");
    }

    // 读取上次保存的配色
    const savedColor = localStorage.getItem('todo_wallpaper_color');
    if (savedColor) {
      document.getElementById("wallpaper-color-input").value = savedColor;
      applyColorWallpaper(savedColor);
    } else {
      document.getElementById("color-dot").style.background = "#533483";
    }

    // ===== TASKS =====
    let sortMode = localStorage.getItem('todo_sort_mode') || 'urgency';
    let selectedPriority = 3;

    const P_COLORS = { 1:'#ff8080', 2:'#ffaa50', 3:'#ffd060', 4:'#80d080', 5:'#80b0ff' };
    const P_LABELS = { 1:'P1', 2:'P2', 3:'P3', 4:'P4', 5:'P5' };

    function getDefaultTasks() {
      return [
        { id: 1, text: "完成 ML 作业 3",                  deadline: new Date(Date.now() + 0.4*3600*1000).toISOString(), priority: 1 },
        { id: 2, text: "读论文 Attention is All You Need", deadline: new Date(Date.now() + 5*3600*1000).toISOString(),   priority: 2 },
        { id: 3, text: "准备组会 PPT",                    deadline: new Date(Date.now() + 5*24*3600*1000).toISOString(), priority: 3 },
      ];
    }

    function saveTasks() { localStorage.setItem('todo_tasks', JSON.stringify(tasks)); }
    function loadTasksFromStorage() {
      const s = localStorage.getItem('todo_tasks');
      if (s) { try { return JSON.parse(s); } catch(e) {} }
      return getDefaultTasks();
    }
    let tasks = loadTasksFromStorage();

    const STATE_ORDER = { overdue:0, panic:1, urgent:2, soon:3, normal:4 };
    const STATE_CFG = {
      overdue: { emoji:"💀", color:"#ff6b6b", quip:"寄了…",      prefix:"⚠️" },
      panic:   { emoji:"😱", color:"#ff6b6b", quip:"快跑啊！！", prefix:"🔥" },
      urgent:  { emoji:"😰", color:"#ffa94d", quip:"快点！",     prefix:"⏰" },
      soon:    { emoji:"😤", color:"#ffd43b", quip:"认真了！",   prefix:"⏰" },
      normal:  { emoji:"😌", color:"#74c0fc", quip:"",           prefix:"📅" },
    };

    function getState(deadline) {
      const h = (new Date(deadline) - Date.now()) / 3600000;
      if (h < 0)  return "overdue";
      if (h < 1)  return "panic";
      if (h < 3)  return "urgent";
      if (h < 24) return "soon";
      return "normal";
    }

    function formatTime(deadline) {
      const h = (new Date(deadline) - Date.now()) / 3600000;
      if (h < 0)   return "已过期";
      if (h < 1)   return Math.ceil(h*60) + " 分钟后";
      if (h < 24)  { const hf=Math.floor(h), mf=Math.floor((h-hf)*60); return mf ? `${hf}h ${mf}m 后` : `${hf} 小时后`; }
      return Math.ceil(h/24) + " 天后";
    }

    function render() {
      const sorted = sortMode === 'priority'
        ? [...tasks].sort((a,b) => (a.priority||3) - (b.priority||3))
        : [...tasks].sort((a,b) => STATE_ORDER[getState(a.deadline)] - STATE_ORDER[getState(b.deadline)]);

      const urgentN = tasks.filter(t => ["panic","urgent","overdue"].includes(getState(t.deadline))).length;

      document.getElementById("task-count").textContent =
        tasks.length === 0 ? "全部完成啦 🎉" :
        urgentN > 0 ? `${tasks.length} 个待完成 · ${urgentN} 个紧急！` :
        `${tasks.length} 个待完成`;

      const btn = document.getElementById("sort-btn");
      if (btn) btn.textContent = sortMode === 'priority' ? '按优先级' : '按紧急';

      const list = document.getElementById("task-list");
      if (tasks.length === 0) {
        list.innerHTML = '<div class="empty-state">🎯 快开始创建你的第一个任务吧！<br><span style="font-size:11px;opacity:0.7">点击右上角 + 添加任务</span></div>';
        return;
      }

      list.innerHTML = sorted.map(t => {
        const s = getState(t.deadline), c = STATE_CFG[s];
        const p = t.priority || 3;
        return `
          <div class="task-item state-${s}" id="task-${t.id}">
            <div class="task-bar" style="background:${c.color}"></div>
            <div class="task-content">
              <div class="task-top-row">
                <span class="task-emoji">${c.emoji}</span>
                <span class="task-name">${t.text}</span>
                <span class="task-priority p${p}">${P_LABELS[p]}</span>
              </div>
              <div class="task-ddl-row">
                <span class="task-ddl" style="color:${c.color}">${c.prefix} ${formatTime(t.deadline)}</span>
                ${c.quip ? `<span class="task-quip" style="color:${c.color}">${c.quip}</span>` : ""}
              </div>
            </div>
            <button class="done-btn" onclick="completeTask(${t.id})">✓</button>
          </div>`;
      }).join("");
    }

    function toggleSortMode() {
      sortMode = sortMode === 'urgency' ? 'priority' : 'urgency';
      localStorage.setItem('todo_sort_mode', sortMode);
      render();
    }

    function selectPriority(p) {
      selectedPriority = p;
      document.querySelectorAll('.ppick').forEach(b => b.classList.remove('sel'));
      document.querySelectorAll(`.ppick.pp${p}`).forEach(b => b.classList.add('sel'));
    }

    function toggleForm() {
      const f = document.getElementById("add-form");
      const visible = f.style.display !== "none";
      f.style.display = visible ? "none" : "block";
      if (!visible) {
        const d = new Date(); d.setHours(23,59,0,0);
        document.getElementById("task-ddl").value = d.toISOString().slice(0,16);
        document.getElementById("task-name").focus();
        selectPriority(3);
      }
    }

    function addTask() {
      const name = document.getElementById("task-name").value.trim();
      const ddl  = document.getElementById("task-ddl").value;
      if (!name) { showToast("❌ 请输入任务名称"); return; }
      if (!ddl)  { showToast("❌ 请设置截止时间"); return; }
      tasks.push({ id: Date.now(), text: name, deadline: new Date(ddl).toISOString(), priority: selectedPriority });
      document.getElementById("task-name").value = "";
      document.getElementById("add-form").style.display = "none";
      saveTasks();
      render();
      showToast("✅ 任务已添加，加油！");
    }

    function completeTask(id) {
      const task = tasks.find(t => t.id === id);
      const el = document.getElementById("task-" + id);
      el.style.opacity = "0";
      el.style.transform = "translateX(24px) scale(0.95)";
      el.style.transition = "all 0.28s ease";
      setTimeout(() => {
        if (task) saveCompletedTask(task);
        tasks = tasks.filter(t => t.id !== id);
        saveTasks(); render();
        showToast(currentLang === 'en' ? "🎉 Done! Great job!" : "🎉 完成！干得漂亮！");
      }, 270);
    }

    // ===== 10-min NOTIFICATIONS =====
    function checkNotify() {
      const urgent = tasks.filter(t => ["panic","urgent","overdue"].includes(getState(t.deadline)));
      if (!urgent.length) return;
      urgent.forEach(t => {
        const c = STATE_CFG[getState(t.deadline)];
        if (Notification.permission === "granted") {
          new Notification(`${c.emoji} ${t.text}`, { body: `${c.prefix} ${formatTime(t.deadline)}  ${c.quip}` });
        }
      });
      showToast(`${STATE_CFG[getState(urgent[0].deadline)].emoji} ${urgent[0].text} — ${STATE_CFG[getState(urgent[0].deadline)].quip}`);
    }

    if (Notification.permission === "default") Notification.requestPermission();

    // ===== TOAST =====
    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 3200);
    }

    // ===== STRETCH TIMER & SESSION LOGIC =====
    let timerDuration = parseInt(localStorage.getItem('todo_timer_duration')) || 3600;
    let stretchTime = timerDuration;
    let stretchExpired = false;
    let timerRunning = false;

    function setDuration(mins) {
      timerDuration = mins * 60;
      localStorage.setItem('todo_timer_duration', timerDuration);
      // 只在未运行时立即更新显示
      if (!timerRunning) {
        stretchTime = timerDuration;
        stretchExpired = false;
      }
      // 更新按钮高亮
      document.querySelectorAll('.duration-btn').forEach(b => {
        b.classList.toggle('sel', parseInt(b.dataset.mins) === mins);
      });
      if (!timerRunning) updateStretchDisplay();
    }

    function startPauseTimer() {
      timerRunning = !timerRunning;
      const btn = document.getElementById('start-timer-btn');
      if (timerRunning) {
        btn.textContent = '⏸ 暂停';
        btn.classList.add('running');
      } else {
        btn.textContent = '▶ 继续';
        btn.classList.remove('running');
      }
    }

    function updateStretchDisplay() {
      const mins = Math.floor(stretchTime / 60);
      const secs = stretchTime % 60;
      const display = document.getElementById("stretch-countdown");
      if (display) display.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

      const counterEl = document.getElementById("session-counter");
      if (counterEl) counterEl.textContent = `(今日专注: ${completedSessions} 次)`;

      const statusLabel = document.getElementById("current-status");
      if (!statusLabel) return;
      if (!timerRunning && stretchTime === timerDuration) {
        statusLabel.textContent = "准备开始 ⏸";
        statusLabel.style.color = "#fff";
      } else if (stretchTime <= 0) {
        statusLabel.textContent = "该拉伸了！🏃‍♂️";
        statusLabel.style.color = "#ff6b6b";
      } else if (stretchTime < 300) {
        statusLabel.textContent = "准备休息 🧘";
        statusLabel.style.color = "#ffd43b";
      } else {
        statusLabel.textContent = timerRunning ? "专注中 🧠" : "已暂停 ⏸";
        statusLabel.style.color = timerRunning ? "#fff" : "#ffd43b";
      }
    }

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    }

    function loadSessions() {
      const saved = localStorage.getItem('todo_sessions_date');
      if (saved !== todayStr()) {
        localStorage.setItem('todo_sessions', '0');
        localStorage.setItem('todo_sessions_date', todayStr());
      }
      return parseInt(localStorage.getItem('todo_sessions')) || 0;
    }

    let completedSessions = loadSessions();

    // 每分钟检查是否跨了0点，跨了就自动重置
    setInterval(() => {
      const now = new Date();
      if (now.getHours() === 0 && now.getMinutes() === 0) {
        completedSessions = 0;
        localStorage.setItem('todo_sessions', '0');
        localStorage.setItem('todo_sessions_date', todayStr());
      }
    }, 60 * 1000);

    function updateStretchTimer() {
      if (timerRunning && stretchTime > 0) {
        stretchTime--;
      }
      if (timerRunning && stretchTime <= 0 && !stretchExpired) {
        stretchExpired = true;
        timerRunning = false;
        const btn = document.getElementById('start-timer-btn');
        if (btn) { btn.textContent = '▶ 开始'; btn.classList.remove('running'); }
        document.getElementById("dino-widget").classList.add("alert");
        showToast("🔔 站起来动动身体，拉伸一下吧！");
      }
      updateStretchDisplay();
    }

    function resetStretchTimer() {
      timerRunning = false;
      stretchTime = timerDuration;
      stretchExpired = false;
      document.getElementById("dino-widget").classList.remove("alert");
      const btn = document.getElementById('start-timer-btn');
      if (btn) { btn.textContent = '▶ 开始'; btn.classList.remove('running'); }
      completedSessions++;
      localStorage.setItem('todo_sessions', completedSessions);
      showToast(`🔄 计时重置！这是你今天的第 ${completedSessions} 次专注，继续保持！`);
      updateStretchDisplay();
    }

    setInterval(updateStretchTimer, 1000);

    // 初始化：高亮已保存的时长按钮
    (function() {
      const savedMins = timerDuration / 60;
      document.querySelectorAll('.duration-btn').forEach(b => {
        b.classList.toggle('sel', parseInt(b.dataset.mins) === savedMins);
      });
      updateStretchDisplay();
    })();

    // ===== NOTEPAD =====
    const NOTEPAD_MAX = 500;
    const notepadEl = document.getElementById("notepad-textarea");
    const notepadCountEl = document.getElementById("notepad-count");

    notepadEl.value = localStorage.getItem('todo_notepad') || "";
    notepadCountEl.textContent = NOTEPAD_MAX - notepadEl.value.length;

    notepadEl.addEventListener("input", () => {
      localStorage.setItem('todo_notepad', notepadEl.value);
      const remaining = NOTEPAD_MAX - notepadEl.value.length;
      notepadCountEl.textContent = remaining;
      notepadCountEl.style.color = remaining < 50
        ? "rgba(255,100,100,0.8)"
        : "rgba(255,255,255,0.4)";
    });

    // ===== TODO PANEL RESIZE =====
    (function() {
      const handle = document.getElementById('todo-resize-handle');
      const desktop = document.getElementById('desktop');
      const MIN_WIDTH = 260;
      const MAX_WIDTH = window.innerWidth * 0.7;
      let startX, startWidth, dragging = false;

      const savedWidth = localStorage.getItem('todo_col_width');
      if (savedWidth) {
        desktop.style.setProperty('--todo-col-width', savedWidth + 'px');
      }

      handle.addEventListener('mousedown', function(e) {
        e.preventDefault();
        dragging = true;
        handle.classList.add('dragging');
        startX = e.clientX;
        const computed = getComputedStyle(desktop).gridTemplateColumns.split(' ');
        startWidth = parseFloat(computed[computed.length - 1]);
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });

      document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        const delta = startX - e.clientX;
        const newWidth = Math.min(MAX_WIDTH, Math.max(MIN_WIDTH, startWidth + delta));
        desktop.style.setProperty('--todo-col-width', newWidth + 'px');
      });

      document.addEventListener('mouseup', function() {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        const computed = getComputedStyle(desktop).gridTemplateColumns.split(' ');
        const finalWidth = parseFloat(computed[computed.length - 1]);
        localStorage.setItem('todo_col_width', Math.round(finalWidth));
      });
    })();

    // ===== INIT =====
    render();
    setInterval(render, 30000);
    setInterval(checkNotify, 10 * 60 * 1000);

    document.addEventListener("keydown", e => {
      const formVisible = document.getElementById("add-form").style.display !== "none";
      if (e.key === "Enter" && formVisible) addTask();
      if (e.key === "Escape") {
        if (formVisible) document.getElementById("add-form").style.display = "none";
        closeMenu(); closeCalendar(); closeReport();
      }
    });

    // ===== COMPLETED TASKS (for reports) =====
    let completedTasks = JSON.parse(localStorage.getItem('todo_completed_tasks') || '[]');
    function saveCompletedTask(task) {
      completedTasks.push({ ...task, completedAt: new Date().toISOString() });
      localStorage.setItem('todo_completed_tasks', JSON.stringify(completedTasks));
    }

    // ===== MENU =====
    let menuOpen = false;
    function toggleMenu() {
      menuOpen = !menuOpen;
      document.getElementById('side-menu').classList.toggle('open', menuOpen);
      document.getElementById('menu-overlay').classList.toggle('open', menuOpen);
    }
    function closeMenu() {
      menuOpen = false;
      document.getElementById('side-menu').classList.remove('open');
      document.getElementById('menu-overlay').classList.remove('open');
    }

    // ===== FOCUS MODE =====
    let focusModeOn = false;
    function toggleFocusMode() {
      focusModeOn = !focusModeOn;
      document.getElementById('desktop').classList.toggle('focus-mode', focusModeOn);
      document.getElementById('focus-toggle').classList.toggle('on', focusModeOn);
      document.getElementById('focus-menu-item').classList.toggle('active', focusModeOn);
    }

    // ===== LANGUAGE =====
    let currentLang = localStorage.getItem('todo_lang') || 'zh';
    const I18N = {
      zh: {
        menuTitle: '扩展坞', notepadTitle: '🌿 随想录',
        notepadPh: '写下一些你今日的灵感吧！让我们效率拉满！',
        myTasks: '⚡ 我的任务', addTaskTitle: '✨ 新任务',
        taskNamePh: '任务名称…', submitBtn: '添加 ✓',
        priorityLabel: '优先级:', sortUrgency: '按紧急', sortPriority: '按优先级',
        emptyState: '🎯 快开始创建你的第一个任务吧！', emptyStateSub: '点击右上角 + 添加任务',
        focusMode: '专注模式', focusModeDesc: '隐藏其他模块，只看任务',
        calendarLabel: '日历视图', calendarDesc: '查看任务日程总览',
        reportLabel: '工作报告', reportDesc: '查看时间段内的任务情况',
        customSection: '陪伴小宠',
      },
      en: {
        menuTitle: 'Dock', notepadTitle: '🌿 Notes',
        notepadPh: 'Write your inspirations here!',
        myTasks: '⚡ My Tasks', addTaskTitle: '✨ New Task',
        taskNamePh: 'Task name…', submitBtn: 'Add ✓',
        priorityLabel: 'Priority:', sortUrgency: 'By Urgency', sortPriority: 'By Priority',
        emptyState: '🎯 Create your first task!', emptyStateSub: 'Click + to add a task',
        focusMode: 'Focus Mode', focusModeDesc: 'Hide other panels, focus on tasks',
        calendarLabel: 'Calendar', calendarDesc: 'View task schedule overview',
        reportLabel: 'Work Report', reportDesc: 'View tasks in a time period',
        customSection: 'Companions',
      }
    };
    function t(key) { return (I18N[currentLang] || I18N.zh)[key] || key; }

    function applyLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('todo_lang', lang);
      document.getElementById('notepad-title-text').textContent = t('notepadTitle');
      document.getElementById('notepad-textarea').placeholder = t('notepadPh');
      document.getElementById('add-form-title').textContent = t('addTaskTitle');
      document.getElementById('task-name').placeholder = t('taskNamePh');
      document.getElementById('submit-btn').textContent = t('submitBtn');
      document.querySelector('.w-title').textContent = t('myTasks');
      document.querySelector('.form-priority-label').textContent = t('priorityLabel');
      document.getElementById('menu-title-text').textContent = t('menuTitle');
      document.getElementById('focus-mode-label').textContent = t('focusMode');
      document.getElementById('focus-mode-desc').textContent = t('focusModeDesc');
      document.getElementById('calendar-label').textContent = t('calendarLabel');
      document.getElementById('calendar-desc').textContent = t('calendarDesc');
      document.getElementById('report-label').textContent = t('reportLabel');
      document.getElementById('report-desc').textContent = t('reportDesc');
      document.getElementById('custom-section-title').textContent = t('customSection');
      document.querySelectorAll('.lang-pill button').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === lang);
      });
      render();
    }

    // Init language
    applyLanguage(currentLang);

    // ===== MASCOTS =====
    const MASCOTS = [
      { emoji: '🦕', name: '恐龙' },
      { emoji: '🐶', name: '小狗' },
      { emoji: '🐱', name: '猫咪' },
      { emoji: '🐰', name: '兔子' },
      { emoji: '🐻', name: '熊熊' },
      { emoji: '🐼', name: '熊猫' },
      { emoji: '🦊', name: '狐狸' },
      { emoji: '🐨', name: '考拉' },
      { emoji: '🐧', name: '企鹅' },
      { emoji: '🐸', name: '青蛙' },
      { emoji: '🦄', name: '独角兽' },
      { emoji: '🐲', name: '龙' },
      { emoji: '🦋', name: '蝴蝶' },
      { emoji: '🌸', name: '樱花' },
      { emoji: '👾', name: '像素' },
    ];

    function toggleMascotPanel() {
      const panel = document.getElementById('mascot-panel');
      const trigger = document.getElementById('pet-trigger');
      const isOpen = panel.classList.toggle('open');
      trigger.classList.toggle('pet-open', isOpen);
    }
    let currentMascot = localStorage.getItem('todo_mascot') || '🦕';

    function applyMascot(emoji) {
      currentMascot = emoji;
      localStorage.setItem('todo_mascot', emoji);
      document.getElementById('mascot-emoji').textContent = emoji;
      document.querySelectorAll('.mascot-option').forEach(el => {
        el.classList.toggle('sel', el.dataset.emoji === emoji);
      });
    }

    function initMascotGrid() {
      const grid = document.getElementById('mascot-grid');
      grid.innerHTML = MASCOTS.map(m => `
        <div class="mascot-option ${m.emoji === currentMascot ? 'sel' : ''}" data-emoji="${m.emoji}" onclick="applyMascot('${m.emoji}')">
          <span class="m-emoji">${m.emoji}</span>
          <span class="m-name">${m.name}</span>
        </div>`).join('');
      document.getElementById('mascot-emoji').textContent = currentMascot;
    }
    initMascotGrid();

    // ===== CALENDAR =====
    let calYear, calMonth, calView = 'month';
    const CAL_MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

    function openCalendar() {
      const now = new Date();
      calYear = now.getFullYear(); calMonth = now.getMonth();
      renderCalendar();
      document.getElementById('calendar-modal').classList.add('open');
      closeMenu();
    }
    function closeCalendar() { document.getElementById('calendar-modal').classList.remove('open'); }
    function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
    function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); }
    function setCalView(v) {
      calView = v;
      document.querySelectorAll('.cal-tab').forEach(b => b.classList.toggle('active', b.dataset.view === v));
      renderCalendar();
    }

    function renderCalendar() {
      document.getElementById('cal-month-label').textContent = `${calYear} 年 ${CAL_MONTHS[calMonth]}`;
      const taskMap = {};
      tasks.forEach(t => {
        const d = new Date(t.deadline);
        const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        if (!taskMap[k]) taskMap[k] = [];
        taskMap[k].push(t);
      });

      if (calView === 'week') {
        const today = new Date();
        const start = new Date(today); start.setDate(today.getDate() - today.getDay());
        let html = '';
        for (let i = 0; i < 7; i++) {
          const day = new Date(start); day.setDate(start.getDate() + i);
          const k = `${day.getFullYear()}-${day.getMonth()}-${day.getDate()}`;
          const dt = taskMap[k] || [];
          const isToday = day.toDateString() === today.toDateString();
          const dots = dt.slice(0,4).map(t => `<div class="cal-dot" style="background:${STATE_CFG[getState(t.deadline)].color}"></div>`).join('');
          html += `<div class="cal-day ${isToday?'today':''} ${dt.length?'has-task':''}" onclick="showCalDayTasks(${JSON.stringify(dt.map(t=>t.text))})">
            <span class="cal-day-num">${day.getDate()}</span>
            <div class="cal-dot-row">${dots}</div></div>`;
        }
        document.getElementById('cal-grid').innerHTML = html;
        return;
      }

      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const today = new Date();
      let html = '';
      for (let i = 0; i < firstDay; i++) html += '<div class="cal-day" style="opacity:0;pointer-events:none"></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const k = `${calYear}-${calMonth}-${d}`;
        const dt = taskMap[k] || [];
        const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
        const dots = dt.slice(0,4).map(t => `<div class="cal-dot" style="background:${STATE_CFG[getState(t.deadline)].color}"></div>`).join('');
        html += `<div class="cal-day ${isToday?'today':''} ${dt.length?'has-task':''}" onclick="showCalDayTasks(${JSON.stringify(dt.map(t=>t.text))})">
          <span class="cal-day-num">${d}</span>
          <div class="cal-dot-row">${dots}</div></div>`;
      }
      document.getElementById('cal-grid').innerHTML = html;
    }

    function showCalDayTasks(names) {
      if (!names.length) return;
      showToast('📅 ' + names.join(' · '));
    }

    // ===== WORK REPORT =====
    function openReport() {
      const today = new Date().toISOString().split('T')[0];
      const weekAgo = new Date(Date.now() - 7*24*3600*1000).toISOString().split('T')[0];
      document.getElementById('report-from').value = weekAgo;
      document.getElementById('report-to').value = today;
      generateReport();
      document.getElementById('report-modal').classList.add('open');
      closeMenu();
    }
    function closeReport() { document.getElementById('report-modal').classList.remove('open'); }

    function generateReport() {
      const from = new Date(document.getElementById('report-from').value);
      const to = new Date(document.getElementById('report-to').value);
      to.setHours(23,59,59,999);

      const done = completedTasks.filter(t => { const d = new Date(t.completedAt); return d >= from && d <= to; });
      const active = tasks.filter(t => { const d = new Date(t.deadline); return d >= from && d <= to; });
      const overdue = active.filter(t => getState(t.deadline) === 'overdue');
      const pending = active.filter(t => getState(t.deadline) !== 'overdue');

      document.getElementById('report-done-count').textContent = done.length;
      document.getElementById('report-pending-count').textContent = pending.length;
      document.getElementById('report-overdue-count').textContent = overdue.length;

      let html = '';
      if (done.length) {
        html += '<div class="report-section-label">✅ 已完成</div>';
        html += done.map(t => `<div class="report-task-item report-task-done">
          <span>✓</span><span>${t.text}</span>
          <span style="margin-left:auto;font-size:10px;opacity:0.5">${new Date(t.completedAt).toLocaleDateString()}</span>
        </div>`).join('');
      }
      if (pending.length) {
        html += '<div class="report-section-label">⏳ 进行中</div>';
        html += pending.map(t => `<div class="report-task-item">
          <span class="task-priority p${t.priority||3}">${P_LABELS[t.priority||3]}</span>
          <span>${t.text}</span>
          <span style="margin-left:auto;font-size:10px;opacity:0.5">${formatTime(t.deadline)}</span>
        </div>`).join('');
      }
      if (overdue.length) {
        html += '<div class="report-section-label">⚠️ 已超期</div>';
        html += overdue.map(t => `<div class="report-task-item" style="background:rgba(255,80,80,0.1)">
          <span>💀</span><span style="color:#ff8080">${t.text}</span>
        </div>`).join('');
      }
      if (!done.length && !active.length) {
        html = '<div style="text-align:center;color:rgba(255,255,255,0.28);padding:24px 0;font-size:13px">该时间段内无任务记录</div>';
      }
      document.getElementById('report-task-list').innerHTML = html;
    }
  </script>
</body>
</html>
