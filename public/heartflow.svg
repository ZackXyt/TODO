<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="40%"  stop-color="#16213e"/>
      <stop offset="70%"  stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
    <linearGradient id="butterflyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7ec7ff"/>
      <stop offset="100%" stop-color="#3b6cff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Soft glow circle -->
  <circle cx="256" cy="256" r="180" fill="rgba(123,180,255,0.08)"/>

  <!-- Butterfly (wings) -->
  <g transform="translate(256 256)" filter="url(#glow)">
    <!-- Left wing upper -->
    <path d="M 0 0 C -90 -110 -180 -90 -150 -10 C -100 30 -40 20 0 0 Z"
          fill="url(#butterflyGrad)" opacity="0.92"/>
    <!-- Left wing lower -->
    <path d="M 0 0 C -80 60 -130 110 -90 130 C -50 130 -20 80 0 30 Z"
          fill="url(#butterflyGrad)" opacity="0.78"/>
    <!-- Right wing upper -->
    <path d="M 0 0 C 90 -110 180 -90 150 -10 C 100 30 40 20 0 0 Z"
          fill="url(#butterflyGrad)" opacity="0.92"/>
    <!-- Right wing lower -->
    <path d="M 0 0 C 80 60 130 110 90 130 C 50 130 20 80 0 30 Z"
          fill="url(#butterflyGrad)" opacity="0.78"/>
    <!-- Body -->
    <ellipse cx="0" cy="10" rx="6" ry="56" fill="#0a1640"/>
    <!-- Antennae -->
    <path d="M -3 -45 Q -15 -75 -28 -78" stroke="#0a1640" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M  3 -45 Q  15 -75  28 -78" stroke="#0a1640" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>
